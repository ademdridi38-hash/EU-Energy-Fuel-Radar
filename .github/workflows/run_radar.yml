name: EU Radar Automation

on:
  schedule:
    # سيتم تشغيل البوت كل 6 ساعات آلياً
    - cron: '0 */6 * * *'
  workflow_dispatch: # يتيح لكِ تشغيل البوت يدوياً من موقع جيتهاب

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests python-dotenv python-telegram-bot

    - name: Run Radar Script
      env:
        # ربط أسرار جيتهاب بالكود الخاص بكِ
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
      run: python main.py
